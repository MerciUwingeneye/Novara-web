<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novara GlobalHealth Platform</title>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { font-family: 'Times New Roman', Times, serif; }
        /* Smooth scrolling */
        html { scroll-behavior: smooth; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- LOGO COMPONENT ---
        const NovaraLogo = ({ className = "" }) => (
          <svg className={className} viewBox="0 0 550 100" fill="none" xmlns="http://www.w3.org/2000/svg" style={{ maxHeight: '100%', width: 'auto' }}>
            <defs>
              <linearGradient id="grad19-app" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stopColor="#00E5FF" />
                <stop offset="100%" stopColor="#2962FF" />
              </linearGradient>
            </defs>
            <g transform="translate(0, 20)">
              <svg width="60" height="60" viewBox="0 0 100 100">
                <polygon points="50,15 75,50 50,85 25,50" fill="url(#grad19-app)" opacity="0.9"/>
                <circle cx="50" cy="50" r="5" fill="#FFFFFF"/>
                <path d="M 22 25 Q 5 50 22 75" stroke="#2962FF" strokeWidth="5" strokeLinecap="round" fill="none"/>
                <path d="M 78 25 Q 95 50 78 75" stroke="#00E5FF" strokeWidth="5" strokeLinecap="round" fill="none"/>
              </svg>
            </g>
            <text x="75" y="64" fontFamily="'Times New Roman', Times, serif" fontSize="48" fontWeight="900" fill="#000000" letterSpacing="-0.02em">
              Novara GlobalHealth<tspan fill="#00E5FF">.</tspan>
            </text>
          </svg>
        );

        const App = () => {
          const [isScrolled, setIsScrolled] = useState(false);

          useEffect(() => {
            const handleScroll = () => {
              setIsScrolled(window.scrollY > 50);
            };
            window.addEventListener('scroll', handleScroll);
            return () => window.removeEventListener('scroll', handleScroll);
          }, []);

          return (
            <div className="min-h-screen bg-white text-slate-900 font-sans selection:bg-[#00E5FF] selection:text-white overflow-x-hidden relative">
              
              {/* --- BACKGROUND EFFECTS --- */}
              <div className="fixed top-0 left-0 w-full h-full overflow-hidden -z-10 pointer-events-none">
                <div className="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-[#2962FF] rounded-full mix-blend-multiply filter blur-[120px] opacity-10 animate-pulse"></div>
                <div className="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-[#00E5FF] rounded-full mix-blend-multiply filter blur-[120px] opacity-10"></div>
              </div>

              {/* --- NAVBAR --- */}
              <nav className={`fixed top-0 w-full z-50 transition-all duration-300 ${isScrolled ? 'bg-white/90 backdrop-blur-md border-b border-slate-200 py-4 shadow-sm' : 'bg-transparent py-6'}`}>
                <div className="max-w-7xl mx-auto px-6 lg:px-8 flex justify-between items-center">
                  <div className="h-14 lg:h-20">
                    <NovaraLogo className="h-full" />
                  </div>
                  <div className="hidden md:flex space-x-8 text-base font-bold text-slate-600">
                    <a href="#mission" className="hover:text-[#2962FF] transition-colors">Our Approach</a>
                    <a href="#innovations" className="hover:text-[#2962FF] transition-colors">Digital Innovations</a>
                    <a href="#leadership" className="hover:text-[#2962FF] transition-colors">Leadership</a>
                  </div>
                  <button className="hidden md:inline-flex items-center justify-center px-5 py-2.5 text-sm font-bold text-[#2962FF] border border-slate-200 rounded-lg hover:border-[#2962FF] hover:bg-[#2962FF]/5 transition-all">
                    Partner With Us
                  </button>
                </div>
              </nav>

              {/* --- SECTION 1: HERO --- */}
              <section className="relative pt-40 pb-20 lg:pt-48 lg:pb-32 px-6 lg:px-8 max-w-7xl mx-auto flex flex-col items-center text-center">
                <div className="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-[#00E5FF]/10 border border-[#00E5FF]/20 text-xs font-bold text-[#008B99] mb-8">
                  <span className="w-2 h-2 rounded-full bg-[#00E5FF] animate-pulse"></span>
                  Prototype Phase Active
                </div>
                
                <h1 className="text-4xl md:text-6xl font-extrabold tracking-tight mb-6 leading-tight max-w-4xl text-slate-900">
                  Advancing the Future of <span className="text-transparent bg-clip-text bg-gradient-to-r from-[#00E5FF] to-[#2962FF]">Equitable Healthcare.</span>
                </h1>
                
                <p className="text-lg md:text-xl text-slate-600 max-w-2xl mb-10 leading-relaxed font-sans">
                  Advancing global health equity through digital health innovations, health education, and evidence-based care.
                </p>
                
                <div className="flex flex-col sm:flex-row gap-4 w-full sm:w-auto font-sans">
                  <a href="#innovations" className="inline-flex items-center justify-center px-8 py-4 text-base font-bold text-white bg-gradient-to-r from-[#2962FF] to-[#00E5FF] rounded-lg hover:shadow-lg hover:shadow-[#00E5FF]/30 transition-all transform hover:-translate-y-0.5">
                    Digital Innovations
                    <i className="fas fa-arrow-right ml-2"></i>
                  </a>
                  <a href="#contact" className="inline-flex items-center justify-center px-8 py-4 text-base font-bold text-slate-700 border border-slate-300 rounded-lg hover:bg-slate-50 transition-all">
                    Partner With Us
                  </a>
                </div>
              </section>

              {/* --- SECTION 2: OUR ARCHITECTURE (MISSION & PILLARS) --- */}
              <section id="mission" className="py-20 px-6 lg:px-8 max-w-7xl mx-auto font-sans">
                <div className="mb-16 md:w-2/3">
                  <h2 className="text-3xl md:text-4xl font-bold mb-6 text-slate-900">Our Approach</h2>
                  <p className="text-xl text-slate-600 leading-relaxed">
                    "At Novara Global Health, we build digital health solutions, empower people, and strengthen health systems worldwide. We translate rigorous clinical research into scalable digital infrastructure."
                  </p>
                </div>

                {/* Bento Box Grid */}
                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                  {/* Pillar 1 */}
                  <div className="bg-white shadow-xl shadow-slate-200/50 border border-slate-100 rounded-2xl p-8 hover:shadow-2xl hover:border-[#00E5FF]/30 transition-all duration-300 group">
                    <div className="w-14 h-14 rounded-2xl bg-[#2962FF]/10 flex items-center justify-center mb-6 text-[#2962FF] group-hover:scale-110 transition-transform">
                      <i className="fas fa-shield-alt text-2xl"></i>
                    </div>
                    <h3 className="text-xl font-bold mb-3 text-slate-900">Evidence-Based Care</h3>
                    <p className="text-slate-600 leading-relaxed">
                      Rooted in clinical excellence to ensure high-quality patient outcomes and adherence to global medical standards.
                    </p>
                  </div>

                  {/* Pillar 2 */}
                  <div className="bg-white shadow-xl shadow-slate-200/50 border border-slate-100 rounded-2xl p-8 hover:shadow-2xl hover:border-[#00E5FF]/30 transition-all duration-300 group">
                    <div className="w-14 h-14 rounded-2xl bg-[#00E5FF]/10 flex items-center justify-center mb-6 text-[#008B99] group-hover:scale-110 transition-transform">
                      <i className="fas fa-chart-line text-2xl"></i>
                    </div>
                    <h3 className="text-xl font-bold mb-3 text-slate-900">Digital Innovation</h3>
                    <p className="text-slate-600 leading-relaxed">
                      Leveraging AI, mobile integrations, and real-time data tracking to eliminate critical healthcare delays.
                    </p>
                  </div>

                  {/* Pillar 3 */}
                  <div className="bg-white shadow-xl shadow-slate-200/50 border border-slate-100 rounded-2xl p-8 hover:shadow-2xl hover:border-[#00E5FF]/30 transition-all duration-300 group">
                    <div className="w-14 h-14 rounded-2xl bg-gradient-to-br from-[#00E5FF]/10 to-[#2962FF]/10 flex items-center justify-center mb-6 text-[#2962FF] group-hover:scale-110 transition-transform">
                      <i className="fas fa-globe text-2xl"></i>
                    </div>
                    <h3 className="text-xl font-bold mb-3 text-slate-900">Global Equity</h3>
                    <p className="text-slate-600 leading-relaxed">
                      Designing robust, localized systems that scale securely to serve the most vulnerable populations across Africa.
                    </p>
                  </div>
                </div>
              </section>

              {/* --- SECTION 3: FLAGSHIP INNOVATIONS --- */}
              <section id="innovations" className="py-20 px-6 lg:px-8 max-w-7xl mx-auto bg-slate-50/50 rounded-3xl mb-20 font-sans">
                <h2 className="text-3xl md:text-4xl font-bold mb-12 text-slate-900">Flagship Innovations</h2>

                <div className="flex flex-col gap-8">
                  
                  {/* Project 1: MATERNIX */}
                  <div className="bg-white shadow-xl shadow-slate-200/50 border border-slate-100 rounded-3xl overflow-hidden hover:border-[#00E5FF]/40 transition-all duration-500 flex flex-col md:flex-row group">
                    
                    {/* Content Side */}
                    <div className="p-8 md:p-12 md:w-1/2 flex flex-col justify-center relative">
                      <div className="relative z-10">
                        <div className="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-[#00E5FF]/10 border border-[#00E5FF]/20 text-xs font-bold text-[#008B99] mb-6 tracking-wider uppercase">
                          Active Prototype
                        </div>
                        <h3 className="text-3xl font-extrabold mb-2 text-slate-900">MATERNIX</h3>
                        <p className="text-[#2962FF] font-semibold mb-6">The Integrated Digital Health Ecosystem for Maternal and Neonatal Outcomes.</p>
                        <p className="text-slate-600 mb-8 leading-relaxed">
                          Bridging the critical gap between facility-based care and the home environment for pregnant women and neonates in Rwanda.
                        </p>
                        
                        <ul className="space-y-3 mb-8">
                          {['Automated Antenatal Care (ANC) scheduling.', 'Danger Sign Triage reporting.', 'Emergency USSD integration.', '"Mama AI" Chatbot for localized health education.'].map((item, i) => (
                            <li key={i} className="flex items-start gap-3">
                              <i className="fas fa-check-circle text-[#00E5FF] flex-shrink-0 mt-1"></i>
                              <span className="text-sm font-medium text-slate-700">{item}</span>
                            </li>
                          ))}
                        </ul>
                        
                        <div className="flex flex-col sm:flex-row gap-4 mt-2">
                          <button className="flex items-center justify-center gap-2 px-6 py-3 bg-slate-900 text-white text-sm font-bold rounded-xl hover:bg-slate-800 transition-colors shadow-md w-fit">
                            View Case Study <i className="fas fa-external-link-alt ml-1"></i>
                          </button>
                        </div>
                      </div>
                    </div>

                    {/* Visual Side (Detailed Phone Mockup) */}
                    <div className="md:w-1/2 bg-slate-50 min-h-[400px] md:min-h-[550px] flex items-center justify-center p-8 border-l border-slate-100 relative overflow-hidden">
                       <div className="absolute inset-0 bg-[radial-gradient(#e5e7eb_1px,transparent_1px)] [background-size:16px_16px] opacity-50"></div>
                       
                       {/* App Interface (Phone Cover) */}
                       <div className="relative w-[280px] h-[540px] bg-white rounded-[2.5rem] border-[14px] border-slate-900 shadow-2xl flex flex-col overflow-hidden z-10">
                          
                          {/* Hardware Notch & Speaker */}
                          <div className="absolute top-0 w-full flex justify-center z-30">
                            <div className="w-32 h-6 bg-slate-900 rounded-b-2xl flex justify-center items-center">
                                <div className="w-10 h-1 rounded-full bg-slate-800"></div>
                            </div>
                          </div>

                          {/* Screen Content */}
                          <div className="flex-1 flex flex-col w-full relative pt-7 bg-white overflow-hidden">
                            
                            {/* App Header / User Profile */}
                            <div className="px-5 pb-5 pt-4 bg-teal-600 text-white rounded-b-3xl shadow-sm z-10 flex items-center justify-between">
                              <div>
                                <p className="text-[11px] text-teal-100 font-medium">Welcome back,</p>
                                <p className="text-base font-bold">Mama Aline</p>
                              </div>
                              <div className="w-9 h-9 bg-white/20 rounded-full flex items-center justify-center border border-white/30">
                                <i className="fas fa-user text-sm text-white"></i>
                              </div>
                            </div>

                            {/* Gestational Age Card */}
                            <div className="px-5 py-3 z-10 -mt-3">
                              <div className="bg-white rounded-2xl shadow-[0_4px_15px_rgba(0,0,0,0.06)] border border-slate-100 p-4 flex justify-between items-center">
                                 <div>
                                   <p className="text-[10px] text-slate-400 font-bold uppercase tracking-wider mb-0.5">Gestational Age</p>
                                   <p className="text-2xl font-black text-teal-600">24 <span className="text-[11px] font-bold text-slate-500">Weeks</span></p>
                                 </div>
                                 <div className="w-10 h-10 rounded-full bg-teal-50 flex items-center justify-center">
                                    <i className="fas fa-baby text-teal-400 text-lg"></i>
                                 </div>
                              </div>
                            </div>

                            {/* ANC Schedule List (Animated Timeline) */}
                            <div className="flex-1 px-5 relative z-0 mt-2">
                              <p className="text-[11px] font-bold text-slate-500 uppercase mb-3 flex items-center gap-2">
                                <i className="far fa-calendar-alt text-teal-500"></i> ANC Schedule
                              </p>
                              <div className="space-y-4 relative">
                                 {/* Vertical Connecting Line */}
                                 <div className="absolute left-[13px] top-2 bottom-4 w-0.5 bg-slate-100 -z-10"></div>
                                 
                                 {/* Item 1 - Completed */}
                                 <div className="flex items-center gap-4">
                                    <i className="fas fa-check-circle text-teal-500 text-base bg-white"></i>
                                    <div className="bg-slate-50 rounded-xl p-2.5 flex-1 border border-slate-100">
                                      <p className="text-[12px] font-bold text-slate-700">ANC 1 (12 Wks)</p>
                                      <p className="text-[10px] text-slate-400">Completed</p>
                                    </div>
                                 </div>
                                 
                                 {/* Item 2 - Completed */}
                                 <div className="flex items-center gap-4">
                                    <i className="fas fa-check-circle text-teal-500 text-base bg-white"></i>
                                    <div className="bg-slate-50 rounded-xl p-2.5 flex-1 border border-slate-100">
                                      <p className="text-[12px] font-bold text-slate-700">ANC 2 (20 Wks)</p>
                                      <p className="text-[10px] text-slate-400">Completed</p>
                                    </div>
                                 </div>
                                 
                                 {/* Item 3 - Next Appointment (Animated) */}
                                 <div className="flex items-center gap-4 transform group-hover:translate-x-1 transition-transform duration-300">
                                    <div className="w-[16px] h-[16px] rounded-full bg-white border-[3px] border-[#2962FF] flex items-center justify-center relative shadow-sm shrink-0">
                                       <div className="w-1.5 h-1.5 bg-[#2962FF] rounded-full animate-pulse"></div>
                                    </div>
                                    <div className="bg-blue-50 rounded-xl p-3 flex-1 border border-blue-200 shadow-sm relative overflow-hidden">
                                      <div className="absolute top-0 right-0 w-10 h-10 bg-blue-100 rounded-full mix-blend-multiply filter blur-sm -mr-3 -mt-3"></div>
                                      <p className="text-[12px] font-bold text-[#2962FF]">ANC 3 (26 Wks)</p>
                                      <p className="text-[10px] text-blue-600 font-bold mt-0.5">Upcoming: Oct 12</p>
                                    </div>
                                 </div>
                                 
                                 {/* Item 4 - Future */}
                                 <div className="flex items-center gap-4 opacity-40">
                                    <div className="w-[16px] h-[16px] rounded-full bg-slate-200 border-2 border-white shadow-sm shrink-0"></div>
                                    <div className="bg-slate-50 rounded-xl p-2.5 flex-1 border border-slate-100">
                                      <p className="text-[12px] font-bold text-slate-500">ANC 4 (30 Wks)</p>
                                    </div>
                                 </div>
                              </div>
                            </div>

                            {/* Emergency / USSD Footer */}
                            <div className="mt-auto px-5 pb-5 pt-3 bg-gradient-to-t from-white via-white to-transparent z-10">
                              <button className="w-full bg-red-50 text-red-600 border border-red-200 rounded-xl p-3 flex items-center justify-center gap-2 hover:bg-red-100 transition-colors shadow-sm group/btn">
                                <i className="fas fa-phone-alt text-[12px] animate-pulse group-hover/btn:animate-none"></i>
                                <span className="text-[12px] font-bold">Emergency SOS (*811#)</span>
                              </button>
                            </div>
                          </div>
                       </div>
                    </div>
                  </div>

                  {/* Project 2: Oncology */}
                  <div className="bg-white border border-slate-200 rounded-3xl p-8 md:p-12 flex flex-col md:flex-row items-center justify-between shadow-sm hover:shadow-md transition-shadow relative overflow-hidden">
                    <div className="absolute top-0 right-0 w-64 h-64 bg-[#2962FF]/5 rounded-full mix-blend-multiply filter blur-[80px]"></div>
                    
                    <div className="md:w-2/3 relative z-10">
                      <div className="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-slate-100 border border-slate-200 text-xs font-bold text-slate-500 mb-4 tracking-wider uppercase">
                        In Development Pipeline
                      </div>
                      <h3 className="text-2xl font-bold mb-3 text-slate-900">Oncology Projects <span className="text-[#2962FF] font-semibold text-lg">(Health Education)</span></h3>
                      <p className="text-slate-600 leading-relaxed">
                        Upcoming modules dedicated to digital cervical cancer and breast cancer awareness and health education tracking.
                      </p>
                    </div>
                    <div className="mt-6 md:mt-0 relative z-10">
                      <button className="px-6 py-3 border border-[#2962FF]/30 bg-[#2962FF]/10 rounded-lg text-sm font-bold text-[#2962FF] shadow-sm cursor-not-allowed">
                        Coming Soon
                      </button>
                    </div>
                  </div>

                </div>
              </section>

              {/* --- SECTION 4: LEADERSHIP & VISION --- */}
              <section id="leadership" className="py-20 px-6 lg:px-8 max-w-7xl mx-auto border-t border-slate-200 font-sans">
                <div className="flex flex-col md:flex-row gap-12 items-center">
                  
                  {/* Portrait */}
                  <div className="w-full md:w-1/3 flex justify-center md:justify-start">
                    <div className="w-64 h-64 md:w-80 md:h-80 rounded-3xl bg-slate-100 border border-slate-200 shadow-inner flex items-center justify-center relative overflow-hidden group">
                       <img 
                          src="Rwanda_20240221_MBBS28MGHDPortraits_AHabinshuti_1015.JPG%20Manzi.jpg" 
                          alt="Merci Uwingeneye - Founder & CEO" 
                          className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105"
                       />
                       <div className="absolute bottom-0 left-0 w-full h-1/3 bg-gradient-to-t from-slate-900/40 to-transparent opacity-60"></div>
                    </div>
                  </div>

                  {/* Vision Text */}
                  <div className="w-full md:w-2/3">
                    <h2 className="text-3xl font-bold mb-6 text-slate-900">Leadership & Vision</h2>
                    <div className="prose max-w-none text-slate-600 leading-relaxed mb-8">
                      <p className="mb-4">
                        At Novara Global Health, our name reflects our ultimate vision: <strong className="text-slate-900">Nova stands for a new frontier</strong>, a new exceptional standard of care where global health equity is a reality, not just an aspiration.
                      </p>
                      <p className="mb-4">
                        We believe that access to high-quality, evidence-based medicine should never be limited by geography, systemic delays, or socioeconomic circumstance. Our commitment is to advance global health equity through digital health innovations, health education, and evidence-based care.
                      </p>
                      <p>
                        By translating rigorous clinical research into scalable digital infrastructure, we build digital health solutions that empower people and strengthen health systems worldwide. Through these advanced, inclusive tools, Novara Global Health is bridging the critical gap between facility-based care and the home environment, ensuring that medical excellence reaches the communities that need it most.
                      </p>
                    </div>
                    
                    <div className="pt-6 border-t border-slate-200">
                      <h4 className="text-xl font-extrabold text-slate-900 mb-1">Merci Uwingeneye</h4>
                      <p className="text-sm font-bold text-[#2962FF]">MD Candidate | MSc Global Health Delivery</p>
                      <p className="text-sm font-medium text-slate-500">Founder & CEO, Novara Global Health</p>
                    </div>
                  </div>

                </div>
              </section>

              {/* --- SECTION 5: FOOTER & CONTACT --- */}
              <footer id="contact" className="bg-slate-50 border-t border-slate-200 pt-20 pb-10 font-sans">
                <div className="max-w-7xl mx-auto px-6 lg:px-8">
                  <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-12 mb-16">
                    
                    {/* Brand Column */}
                    <div className="lg:col-span-2">
                      <div className="h-14 lg:h-20 mb-6">
                        <NovaraLogo className="h-full" />
                      </div>
                      <p className="text-slate-600 max-w-sm mb-6 text-sm leading-relaxed">
                        Advancing global health equity through digital health innovations, health education, and evidence-based care in Rwanda and Africa.
                      </p>
                      <p className="text-slate-900 font-bold text-sm flex items-center gap-2">
                        <i className="fas fa-envelope text-[#2A8B82]"></i> Contact: <a href="mailto:novara.globalhealth@gmail.com" className="text-slate-600 font-medium hover:text-[#2A8B82] transition-colors">novara.globalhealth@gmail.com</a>
                      </p>
                    </div>

                    {/* Links Column */}
                    <div>
                      <h4 className="text-slate-900 font-bold mb-4">Platform</h4>
                      <ul className="space-y-3 text-sm font-medium text-slate-600">
                        <li><a href="#mission" className="hover:text-[#2962FF] transition-colors">Our Approach</a></li>
                        <li><a href="#innovations" className="hover:text-[#2962FF] transition-colors">Maternix Ecosystem</a></li>
                        <li><a href="#" className="hover:text-[#2962FF] transition-colors">Oncology programs</a></li>
                        <li><a href="#leadership" className="hover:text-[#2962FF] transition-colors">Leadership</a></li>
                      </ul>
                    </div>

                    {/* Connect Column */}
                    <div>
                      <h4 className="text-black font-bold mb-4">Connect With Us</h4>
                      <div className="flex flex-col gap-3">
                        <a href="https://www.linkedin.com/company/novara-global-health/about/?viewAsMember=true" target="_blank" rel="noopener noreferrer" className="bg-[#2A8B82] hover:bg-[#1f6b64] text-white rounded-lg px-4 py-2.5 text-sm font-medium transition-all shadow-sm flex items-center gap-3 w-fit md:w-full">
                          <i className="fa-brands fa-linkedin text-lg w-5 text-center"></i> LinkedIn
                        </a>
                        <a href="#" className="bg-[#2A8B82] hover:bg-[#1f6b64] text-white rounded-lg px-4 py-2.5 text-sm font-medium transition-all shadow-sm flex items-center gap-3 w-fit md:w-full">
                          <i className="fa-brands fa-x-twitter text-lg w-5 text-center"></i> Twitter/X
                        </a>
                        <a href="#" className="bg-[#2A8B82] hover:bg-[#1f6b64] text-white rounded-lg px-4 py-2.5 text-sm font-medium transition-all shadow-sm flex items-center gap-3 w-fit md:w-full">
                          <i className="fa-brands fa-instagram text-lg w-5 text-center"></i> Instagram
                        </a>
                      </div>
                    </div>

                    {/* Contact Form Column */}
                    <div>
                      <h4 className="text-black font-bold mb-4">Partner With Us</h4>
