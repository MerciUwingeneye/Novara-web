<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novara GlobalHealth Platform</title>
    
    <!-- 1. Preconnect to external servers to speed up initial connection -->
    <link rel="preconnect" href="https://unpkg.com">
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    
    <!-- Vercel Trackers (Added 'defer' so they don't block loading) -->
    <script>
      window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
      window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
    </script>
    <script src="/_vercel/insights/script.js"></script>
    <script src="/_vercel/speed-insights/script.js"></script>
    
    <!-- 2. React & ReactDOM (Switched from 'development' to 'production' for massive speed boost) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        
        body { font-family: 'Times New Roman', Times, serif; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
        .font-sans { font-family: 'Inter', sans-serif; }
        html { scroll-behavior: smooth; }

        /* Custom Slow 4-second Slide-Up Animation */
        .phone-screen-slide-up {
            animation: slideUpContent 4s cubic-bezier(0.19, 1, 0.22, 1) forwards;
        }

        @keyframes slideUpContent {
            from { opacity: 0; transform: translateY(120px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .phone-shadow {
            box-shadow: 0 40px 80px -20px rgba(0, 0, 0, 0.4), 0 20px 40px -20px rgba(0, 0, 0, 0.5);
        }

        /* Custom Organic Blob Shapes for the Photo Frame */
        .squircle-bg {
            border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
            animation: morph 8s ease-in-out infinite;
        }

        @keyframes morph {
            0% { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }
            50% { border-radius: 30% 60% 70% 40% / 50% 60% 30% 60%; }
            100% { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }
        }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- LOGO COMPONENT ---
        const NovaraLogo = ({ className = "" }) => (
          <svg className={className} viewBox="0 0 550 100" fill="none" xmlns="http://www.w3.org/2000/svg" style={{ maxHeight: '100%', width: 'auto' }}>
            <defs>
              <linearGradient id="grad19-app" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stopColor="#00E5FF" />
                <stop offset="100%" stopColor="#2962FF" />
              </linearGradient>
            </defs>
            <g transform="translate(0, 20)">
              <svg width="60" height="60" viewBox="0 0 100 100">
                <polygon points="50,15 75,50 50,85 25,50" fill="url(#grad19-app)" opacity="0.9"/>
                <circle cx="50" cy="50" r="5" fill="#FFFFFF"/>
                <path d="M 22 25 Q 5 50 22 75" stroke="#2962FF" strokeWidth="5" strokeLinecap="round" fill="none"/>
                <path d="M 78 25 Q 95 50 78 75" stroke="#00E5FF" strokeWidth="5" strokeLinecap="round" fill="none"/>
              </svg>
            </g>
            <text x="75" y="64" fontFamily="'Times New Roman', Times, serif" fontSize="48" fontWeight="900" fill="#0F172A" letterSpacing="-0.02em">
              Novara GlobalHealth<tspan fill="#00E5FF">.</tspan>
            </text>
          </svg>
        );

        // --- ANIMATED PHONE MOCKUP COMPONENT ---
        const MaternixPhone = () => {
            const [activeScreen, setActiveScreen] = useState(0);
            
            const screens = [
                {
                    id: 'dashboard',
                    title: 'Live Dashboard',
                    content: (
                        <div key="dashboard" className="flex flex-col h-full phone-screen-slide-up pb-16">
                            <div className="px-5 pb-8 pt-12 bg-[#008B99] text-white rounded-b-[2.5rem] relative overflow-hidden shadow-lg">
                                <div className="absolute top-0 right-0 w-24 h-24 bg-white/10 rounded-full -mr-10 -mt-10 blur-2xl"></div>
                                <div className="relative z-10 flex justify-between items-start">
                                    <div>
                                        <p className="text-[10px] text-teal-100 font-black tracking-widest opacity-90 uppercase">Welcome back,</p>
                                        <h4 className="text-xl font-bold mt-1 leading-tight tracking-tight">Mama Aline</h4>
                                    </div>
                                    <div className="w-10 h-10 bg-white/20 rounded-xl flex items-center justify-center border border-white/30 backdrop-blur-md shadow-sm">
                                        <i className="fas fa-user text-white text-sm"></i>
                                    </div>
                                </div>
                            </div>
                            <div className="px-4 py-4 -mt-6 z-20 space-y-3">
                                <div className="bg-white rounded-[2rem] shadow-[0_15px_40px_rgba(0,0,0,0.06)] border border-slate-50 p-5 flex justify-between items-center">
                                    <div>
                                        <p className="text-[9px] text-slate-400 font-black uppercase tracking-[0.2em] mb-1">Gestational Age</p>
                                        <p className="text-3xl font-black text-[#008B99]">24 <span className="text-xs font-bold text-slate-400">Weeks</span></p>
                                    </div>
                                    <div className="w-12 h-12 rounded-[1.2rem] bg-teal-50 flex items-center justify-center text-[#008B99] shadow-inner">
                                        <i className="fas fa-baby text-2xl"></i>
                                    </div>
                                </div>
                                <div className="bg-white rounded-[2rem] shadow-[0_15px_40px_rgba(0,0,0,0.06)] border border-slate-50 p-4">
                                    <div className="flex items-center gap-3 mb-3">
                                        <div className="w-7 h-7 rounded-lg bg-blue-50 flex items-center justify-center text-[10px] text-[#2962FF]">
                                            <i className="fas fa-calendar-check"></i>
                                        </div>
                                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Upcoming Checkup</p>
                                    </div>
                                    <p className="text-base font-black text-slate-800">ANC 3 (26 Weeks)</p>
                                    <p className="text-[10px] text-slate-500 font-bold mt-1.5 flex items-center gap-2">
                                        <i className="fas fa-hospital-user text-[#2962FF]"></i> Oct 12 • Butaro Hospital
                                    </p>
                                </div>
                            </div>
                        </div>
                    )
                },
                {
                    id: 'schedule',
                    title: 'Care Timeline',
                    content: (
                        <div key="schedule" className="flex flex-col h-full phone-screen-slide-up pb-16">
                            <div className="px-5 pb-6 pt-12 bg-[#2962FF] text-white rounded-b-[2.5rem] shadow-lg">
                                <h4 className="text-xl font-bold tracking-tight">Your Timeline</h4>
                                <p className="text-[10px] opacity-80 mt-1 font-black uppercase tracking-[0.3em]">8 WHO Visits</p>
                            </div>
                            <div className="flex-1 px-4 py-5 space-y-3 no-scrollbar overflow-y-auto">
                                {[
                                    { wk: 12, label: 'ANC 1 (12 Wks)', status: 'done' },
                                    { wk: 20, label: 'ANC 2 (20 Wks)', status: 'done' },
                                    { wk: 26, label: 'ANC 3 (26 Wks)', status: 'next' },
                                    { wk: 30, label: 'ANC 4 (30 Wks)', status: 'pending' }
                                ].map((item, i) => (
                                    <div key={i} className={`flex items-center gap-4 p-3.5 rounded-[1.5rem] border transition-all ${item.status === 'next' ? 'bg-blue-50 border-blue-200 ring-2 ring-blue-50/50' : 'bg-white border-slate-100'}`}>
                                        <div className={`w-9 h-9 rounded-[1rem] flex items-center justify-center text-xs ${item.status === 'done' ? 'bg-teal-500 text-white' : item.status === 'next' ? 'bg-[#2962FF] text-white animate-pulse shadow-md shadow-blue-200' : 'bg-slate-100 text-slate-400'}`}>
                                            {item.status === 'done' ? <i className="fas fa-check"></i> : <span className="font-black">{i+1}</span>}
                                        </div>
                                        <div>
                                            <p className="text-[13px] font-black text-slate-800">{item.label}</p>
                                            <p className="text-[10px] font-bold text-slate-400 mt-0.5">{item.status === 'next' ? 'Scheduled: Oct 12' : item.status === 'done' ? 'Completed at Clinic' : 'Upcoming'}</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )
                },
                {
                    id: 'mama-ai',
                    title: 'Mama AI Support',
                    content: (
                        <div key="mama-ai" className="flex flex-col h-full phone-screen-slide-up pb-16">
                            <div className="px-5 pb-5 pt-12 bg-indigo-600 text-white rounded-b-[2.5rem] flex items-center gap-4 shadow-lg">
                                <div className="w-12 h-12 bg-white/20 rounded-[1.2rem] flex items-center justify-center backdrop-blur-md border border-white/20">
                                    <i className="fas fa-brain text-lg"></i>
                                </div>
                                <div>
                                    <h4 className="text-xl font-bold tracking-tight">Mama AI</h4>
                                    <p className="text-[10px] text-indigo-100 font-black uppercase tracking-widest">Medical Assistant</p>
                                </div>
                            </div>
                            <div className="flex-1 p-4 space-y-3">
                                <div className="bg-slate-100 p-3.5 rounded-[1.5rem] rounded-tl-none text-xs leading-relaxed text-slate-700 max-w-[90%] font-medium">
                                    Muraho Mama! It is normal to feel tired at 24 weeks. Are you eating enough iron-rich foods?
                                </div>
                                <div className="bg-indigo-600 p-3.5 rounded-[1.5rem] rounded-tr-none text-xs leading-relaxed text-white max-w-[85%] ml-auto font-bold shadow-md shadow-indigo-100">
                                    Yes, I have been eating beans. What else do you recommend?
                                </div>
                                <div className="bg-white border border-slate-100 p-3.5 rounded-[1.5rem] rounded-tl-none text-xs leading-relaxed text-slate-700 max-w-[90%] font-medium shadow-sm">
                                    Dodo and small fish (Sambaza) are also great!
                                </div>
                            </div>
                        </div>
                    )
                }
            ];

            useEffect(() => {
                const timer = setInterval(() => {
                    setActiveScreen(prev => (prev + 1) % screens.length);
                }, 11000); // 7s stay active + 4s transition
                return () => clearInterval(timer);
            }, []);

            return (
                <div className="relative group cursor-default flex flex-col items-center">
                    <div className="absolute inset-0 bg-teal-400/20 blur-[100px] rounded-full scale-90 transition-opacity opacity-0 group-hover:opacity-100 duration-1000"></div>
                    
                    {/* Natively smaller dimensions */}
                    <div className="relative w-[280px] h-[580px] bg-slate-900 rounded-[3.5rem] border-[12px] border-slate-950 shadow-2xl overflow-hidden font-sans phone-shadow z-10">
                        <div className="absolute top-0 left-1/2 -translate-x-1/2 w-36 h-7 bg-slate-950 z-50 rounded-b-[1.5rem] flex items-center justify-center">
                            <div className="w-12 h-1 bg-slate-800 rounded-full"></div>
                        </div>

                        <div className="absolute top-0 w-full px-8 pt-3 flex justify-between items-center text-[10px] text-white/50 z-40 font-black tracking-tighter">
                            <span>9:41</span>
                            <div className="flex gap-1.5 items-center">
                                <i className="fas fa-signal"></i>
                                <i className="fas fa-wifi text-[8px]"></i>
                                <i className="fas fa-battery-full text-[10px]"></i>
                            </div>
                        </div>

                        <div className="h-full w-full bg-slate-50 relative overflow-hidden">
                            {screens[activeScreen].content}

                            <div className="absolute bottom-0 w-full bg-white/95 backdrop-blur-xl border-t border-slate-100 pt-3 pb-6 px-5 flex justify-between items-center z-50 shadow-[0_-15px_30px_rgba(0,0,0,0.03)]">
                                <div className={`flex flex-col items-center flex-1 transition-all duration-700 ${activeScreen === 0 ? 'text-[#008B99]' : 'text-slate-300'}`}>
                                    <i className="fas fa-house-chimney text-[17px] mb-1"></i>
                                    <span className="text-[9px] font-black uppercase tracking-[0.1em]">Home</span>
                                </div>
                                <div className={`flex flex-col items-center flex-1 transition-all duration-700 ${activeScreen === 1 ? 'text-[#2962FF]' : 'text-slate-300'}`}>
                                    <i className="fas fa-calendar-day text-[17px] mb-1"></i>
                                    <span className="text-[9px] font-black uppercase tracking-[0.1em]">Visits</span>
                                </div>
                                <div className={`flex flex-col items-center flex-1 transition-all duration-700 ${activeScreen === 2 ? 'text-indigo-600' : 'text-slate-300'}`}>
                                    <i className="fas fa-message-sparkles text-[17px] mb-1"></i>
                                    <span className="text-[9px] font-black uppercase tracking-[0.1em]">AI Hub</span>
                                </div>
                                <div className="flex flex-col items-center flex-1">
                                    <div className="w-10 h-10 rounded-[0.8rem] bg-red-500 text-white flex items-center justify-center shadow-lg shadow-red-200">
                                        <i className="fas fa-phone-flip text-[13px]"></i>
                                    </div>
                                    <span className="text-[9px] font-black text-red-500 mt-1 uppercase tracking-[0.1em]">SOS</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="mt-8 flex flex-col items-center">
                        <div className="flex gap-3">
                            {screens.map((_, i) => (
                                <div 
                                    key={i} 
                                    onClick={() => setActiveScreen(i)}
                                    className={`h-1.5 cursor-pointer rounded-full transition-all duration-1000 ${activeScreen === i ? 'w-10 bg-teal-500 shadow-sm shadow-teal-100' : 'w-2 bg-slate-200'}`}
                                ></div>
                            ))}
                        </div>
                        <p className="mt-4 text-[10px] font-black text-slate-400 uppercase tracking-[0.4em] animate-pulse">Previewing {screens[activeScreen].title}</p>
                    </div>
                </div>
            );
        };

        const App = () => {
          const [isScrolled, setIsScrolled] = useState(false);

          useEffect(() => {
            const handleScroll = () => {
              setIsScrolled(window.scrollY > 50);
            };
            window.addEventListener('scroll', handleScroll);
            return () => window.removeEventListener('scroll', handleScroll);
          }, []);

          return (
            <div className="min-h-screen bg-white text-slate-900 font-sans selection:bg-[#00E5FF] selection:text-white overflow-x-hidden relative">
              
              <div className="fixed top-0 left-0 w-full h-full overflow-hidden -z-10 pointer-events-none">
                <div className="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-[#2962FF] rounded-full mix-blend-multiply filter blur-[120px] opacity-10 animate-pulse"></div>
                <div className="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-[#00E5FF] rounded-full mix-blend-multiply filter blur-[120px] opacity-10"></div>
              </div>

              <nav className={`fixed top-0 w-full z-50 transition-all duration-300 ${isScrolled ? 'bg-white/90 backdrop-blur-md border-b border-slate-200 py-4 shadow-sm' : 'bg-transparent py-6'}`}>
                <div className="max-w-7xl mx-auto px-6 lg:px-8 flex justify-between items-center">
                  <div className="h-14 lg:h-20">
                    <NovaraLogo className="h-full" />
                  </div>
                  <div className="hidden md:flex space-x-8 text-xs font-extrabold text-black uppercase tracking-widest">
                    <a href="#mission" className="hover:text-[#2962FF] transition-colors">Our Mission</a>
                    <a href="#innovations" className="hover:text-[#2962FF] transition-colors">Innovations</a>
                    <a href="#leadership" className="hover:text-[#2962FF] transition-colors">Leadership</a>
                  </div>
                  <button className="hidden md:inline-flex items-center justify-center px-6 py-2.5 text-xs font-black text-[#2962FF] border border-slate-200 rounded-lg hover:border-[#2962FF] hover:bg-[#2962FF]/5 transition-all uppercase tracking-widest">
                    Partner With Us
                  </button>
                </div>
              </nav>

              <section className="relative pt-40 pb-20 lg:pt-48 lg:pb-32 px-6 lg:px-8 max-w-7xl mx-auto flex flex-col items-center text-center text-slate-900">
                <h1 className="text-3xl md:text-5xl font-extrabold tracking-tight mb-6 leading-tight max-w-4xl text-slate-900">
                  Advancing the Future of <span className="text-transparent bg-clip-text bg-gradient-to-r from-[#00E5FF] to-[#2962FF]">Equitable Healthcare.</span>
                </h1>
                
                <p className="text-lg text-slate-600 max-w-2xl mb-10 leading-relaxed font-sans">
                  Advancing global health equity through digital health innovations, health education, and evidence-based care in Rwanda.
                </p>
                
                <div className="flex flex-col sm:flex-row gap-4 w-full sm:w-auto font-sans">
                  <a href="#innovations" className="inline-flex items-center justify-center px-8 py-4 text-sm font-black text-white bg-gradient-to-r from-[#2962FF] to-[#00E5FF] rounded-lg hover:shadow-lg hover:shadow-[#00E5FF]/30 transition-all transform hover:-translate-y-0.5 uppercase tracking-widest">
                    Digital Innovations
                  </a>
                  <a href="#contact" className="inline-flex items-center justify-center px-8 py-4 text-sm font-black text-slate-700 border border-slate-300 rounded-lg hover:bg-slate-50 transition-all uppercase tracking-widest">
                    Partner With Us
                  </a>
                </div>
              </section>

              {/* NEW SECTION: GLOBAL BURDEN DATA */}
              <section className="py-24 px-6 bg-slate-50/50 font-sans border-y border-slate-100 overflow-hidden">
                <div className="max-w-6xl mx-auto flex flex-col items-center text-center">
                  
                  <div className="inline-flex items-center gap-2 px-3 py-1.5 rounded-full bg-[#00E5FF]/10 border border-[#00E5FF]/20 text-[11px] font-black text-[#008B99] mb-6 tracking-[0.3em] uppercase">
                    Global Burden of Maternal & Neonatal Mortality
                  </div>
                  
                  <h2 className="text-3xl md:text-5xl font-extrabold tracking-tight mb-6 leading-tight max-w-4xl text-slate-900">
                    2.6 Million <span className="text-transparent bg-clip-text bg-gradient-to-r from-[#00E5FF] to-[#2962FF]">Deaths Annually.</span>
                  </h2>
                  
                  <p className="text-lg text-slate-600 font-medium leading-relaxed mb-12 max-w-4xl">
                    Maternal and neonatal mortality remain among the most critical indicators of global health inequity. Despite significant medical advancements, a disproportionate burden persists in low-resource settings. According to the World Health Organization, the vast majority of these deaths are preventable through timely, evidence-based clinical interventions and access to quality antenatal, delivery, and postnatal care (WHO, 2024–2025).
                  </p>

                  {/* --- WORLD MAP FIGURE --- */}
                  <div className="relative w-full max-w-4xl mx-auto mb-16 h-[250px] md:h-[450px]">
                    
                    {/* Main Map with Single Solid Brand Color */}
                    <div 
                      className="absolute inset-0 bg-[#008B99]"
                      style={{ 
                        WebkitMaskImage: 'url("https://upload.wikimedia.org/wikipedia/commons/e/ec/World_map_blank_without_borders.svg")', 
                        WebkitMaskSize: 'contain', 
                        WebkitMaskRepeat: 'no-repeat', 
                        WebkitMaskPosition: 'center',
                        maskImage: 'url("https://upload.wikimedia.org/wikipedia/commons/e/ec/World_map_blank_without_borders.svg")',
                        maskSize: 'contain',
                        maskRepeat: 'no-repeat',
                        maskPosition: 'center'
                      }}
                    ></div>

                    {/* Interactive Pulse Marker on Sub-Saharan Africa */}
                    <div className="absolute top-[55%] left-[51%] md:top-[56%] md:left-[52%] flex flex-col items-center group cursor-pointer z-10">
                      <div className="relative flex justify-center items-center">
                        <span className="absolute w-6 h-6 md:w-10 md:h-10 bg-red-500 rounded-full animate-ping opacity-60"></span>
                        <span className="relative w-2.5 h-2.5 md:w-3 md:h-3 bg-white border-2 border-red-500 rounded-full shadow-[0_0_15px_rgba(239,68,68,0.8)]"></span>
                      </div>
                      
                      {/* Interactive Tooltip on Hover */}
                      <div className="absolute bottom-8 left-1/2 -translate-x-1/2 w-64 bg-white/95 backdrop-blur-md border border-slate-200 shadow-2xl rounded-2xl p-4 opacity-0 group-hover:opacity-100 transition-all duration-300 transform translate-y-2 group-hover:translate-y-0 pointer-events-none z-20">
                        <div className="text-[10px] font-black text-red-500 uppercase tracking-widest mb-1 flex items-center gap-1">
                          <i className="fas fa-exclamation-circle"></i> High-Burden Regions
                        </div>
                        <p className="text-xs font-medium text-slate-700 leading-relaxed text-left">Over <strong className="text-slate-900">95%</strong> of maternal and neonatal deaths occur in low- and middle-income countries.</p>
                      </div>
                    </div>
                  </div>
                  
                  <div className="w-full max-w-4xl flex items-center gap-4 mb-12">
                    <div className="h-px bg-slate-200 flex-1"></div>
                    <h4 className="text-slate-900 font-bold text-xs uppercase tracking-widest">Key Global Statistics</h4>
                    <div className="h-px bg-slate-200 flex-1"></div>
                  </div>
                  
                  <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-10 w-full">
                    <div className="flex flex-col items-center">
                      <div className="text-3xl md:text-4xl font-black text-[#2962FF] mb-4 tracking-tight">287,000</div>
                      <div className="flex items-center gap-3 group">
                        <div className="w-8 h-8 shrink-0 rounded-full bg-[#00E5FF]/10 flex items-center justify-center text-[#008B99] shadow-sm group-hover:scale-110 transition-all">
                          <i className="fas fa-person-pregnant"></i>
                        </div>
                        <span className="text-sm font-medium text-slate-700 text-left max-w-[120px]">maternal deaths each year</span>
                      </div>
                    </div>
                    <div className="flex flex-col items-center">
                      <div className="text-3xl md:text-4xl font-black text-[#2962FF] mb-4 tracking-tight">2.3 Million</div>
                      <div className="flex items-center gap-3 group">
                        <div className="w-8 h-8 shrink-0 rounded-full bg-[#00E5FF]/10 flex items-center justify-center text-[#008B99] shadow-sm group-hover:scale-110 transition-all">
                          <i className="fas fa-baby"></i>
                        </div>
                        <span className="text-sm font-medium text-slate-700 text-left max-w-[120px]">newborn deaths annually</span>
                      </div>
                    </div>
                    <div className="flex flex-col items-center">
                      <div className="text-3xl md:text-4xl font-black text-[#2962FF] mb-4 tracking-tight">47%</div>
                      <div className="flex items-center gap-3 group">
                        <div className="w-8 h-8 shrink-0 rounded-full bg-[#00E5FF]/10 flex items-center justify-center text-[#008B99] shadow-sm group-hover:scale-110 transition-all">
                          <i className="fas fa-chart-pie"></i>
                        </div>
                        <span className="text-sm font-medium text-slate-700 text-left max-w-[140px]">of under-five deaths occur in neonatal period</span>
                      </div>
                    </div>
                    <div className="flex flex-col items-center">
                      <div className="text-3xl md:text-4xl font-black text-[#2962FF] mb-4 tracking-tight">~95%</div>
                      <div className="flex items-center gap-3 group">
